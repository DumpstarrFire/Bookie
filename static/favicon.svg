<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background rounded square -->
  <rect width="32" height="32" rx="7" fill="#2D2640"/>
  <!-- Book spine (left bar) -->
  <rect x="7" y="6" width="3.5" height="20" rx="1.5" fill="#9A85C7"/>
  <!-- Book cover/pages -->
  <rect x="10.5" y="6" width="14.5" height="20" rx="1.5" fill="#D0BCFF"/>
  <!-- Page lines -->
  <line x1="13" y1="11" x2="22" y2="11" stroke="#9A85C7" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="13" y1="14" x2="22" y2="14" stroke="#9A85C7" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="13" y1="17" x2="19" y2="17" stroke="#9A85C7" stroke-width="1.2" stroke-linecap="round"/>
</svg>
